name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run lint
        continue-on-error: true
      - run: npm test
        env:
          MONGODB_URI: mongodb://localhost:27017/bug-tracker-test
          NODE_ENV: test
          JWT_PRIVATE_KEY: test-private-key
          JWT_PUBLIC_KEY: test-public-key
          GEMINI_API_KEY: test-key

  lint-and-test-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Server audit
        working-directory: ./server
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Client audit
        working-directory: ./client
        run: npm audit --audit-level=high
        continue-on-error: true